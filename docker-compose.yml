version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: asaph-db
    environment:
      POSTGRES_DB: ashalert
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jamjan08
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asaph-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/ashalert
      DB_USERNAME: postgres
      DB_PASSWORD: jamjan08
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
