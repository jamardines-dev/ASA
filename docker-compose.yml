services:
  postgres:
    image: postgres:15-alpine
    container_name: asaph-db
    environment:
      POSTGRES_DB: ashalert
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jamjan08
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asaph-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ashalert
      DB_DRIVER: org.postgresql.Driver
      DB_USERNAME: postgres
      DB_PASSWORD: jamjan08
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asaph-frontend
    environment:
      VITE_API_BASE_URL: http://backend:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
